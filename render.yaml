services:
  # ─── Backend Spring Boot ─────────────────────────────────────────────────
  - type: web
    name: f1-pitwall-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://f1-pitwall.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: f1-pitwall-db
          property: connectionString
      - key: PGUSER
        fromDatabase:
          name: f1-pitwall-db
          property: user
      - key: PGPASSWORD
        fromDatabase:
          name: f1-pitwall-db
          property: password
      - key: PGHOST
        fromDatabase:
          name: f1-pitwall-db
          property: host
      - key: PGPORT
        fromDatabase:
          name: f1-pitwall-db
          property: port
      - key: PGDATABASE
        fromDatabase:
          name: f1-pitwall-db
          property: database
    healthCheckPath: /actuator/health

# ─── PostgreSQL Database ─────────────────────────────────────────────────
databases:
  - name: f1-pitwall-db
    plan: free
    databaseName: f1_pitwall_db
