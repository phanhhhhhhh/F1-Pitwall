# ── Test profile: H2 in-memory database ──────────────────────────────────────
# No external Postgres needed — tests run anywhere

spring.datasource.url=jdbc:h2:mem:pitwall_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT — dummy secret for tests (must be ≥32 chars)
app.jwt.secret=test-secret-key-12345678901234567890
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000

# OAuth (disabled in tests — no external calls)
spring.security.oauth2.client.registration.google.client-id=dummy-test
spring.security.oauth2.client.registration.google.client-secret=dummy-test
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# CORS
allowed.origins=http://localhost:3000

# Email (disabled in tests)
resend.api-key=dummy
resend.from=test@test.com

# Redis (disabled — fallback to in-memory)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Testcontainers — disabled by default (tests use H2).
# Enable per-test-class with @TestPropertySource when real PG is needed.
spring.testcontainers.enabled=false

# Logging
logging.level.root=WARN
logging.level.backend=INFO
spring.jmx.enabled=false
