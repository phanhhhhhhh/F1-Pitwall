server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/f1_pitwall_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000



spring.security.oauth2.client.registration.google.client-id=dummy-local
spring.security.oauth2.client.registration.google.client-secret=dummy-local
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Resend email API (https://resend.com) — set RESEND_API_KEY in environment
resend.api-key=${RESEND_API_KEY:}
resend.from=${RESEND_FROM:onboarding@resend.dev}

spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
