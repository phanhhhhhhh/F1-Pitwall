server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/f1_pitwall_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

app.jwt.secret=${JWT_SECRET:f1-pitwall-super-secret-key-2024-minimum-256-bits-long-for-hs256-algorithm}
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000



spring.security.oauth2.client.registration.google.client-id=dummy-local
spring.security.oauth2.client.registration.google.client-secret=dummy-local
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Gmail SMTP — set MAIL_USERNAME (Gmail address) and MAIL_PASSWORD (App Password from myaccount.google.com/apppasswords)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
