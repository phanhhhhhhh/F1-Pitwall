spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE:f1_pitwall_db}?sslmode=require
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# JWT — MUST match app.jwt.* keys used by JwtService.java
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000

# CORS — MUST match allowed.origins key used by SecurityConfig.java
allowed.origins=${FRONTEND_URL:https://f1-pitwall.vercel.app}

# Email: OTP codes are sent via Resend HTTP API (not SMTP).
# Configure RESEND_API_KEY and RESEND_FROM in environment.
# See EmailService.java for implementation details.

# Redis (optional cache — falls back to in-memory if unavailable)
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

logging.level.root=WARN
logging.level.backend=INFO
spring.jmx.enabled=false
