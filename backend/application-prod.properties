spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.security.oauth2.client.registration.google.client-id=dummy-local
spring.security.oauth2.client.registration.google.client-secret=dummy-local
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000

allowed.origins=${FRONTEND_URL:https://f1-pitwall-tau.vercel.app},https://*.vercel.app

resend.api-key=${RESEND_API_KEY:}
resend.from=${RESEND_FROM:onboarding@resend.dev}

logging.level.root=WARN
logging.level.backend=INFO
spring.jmx.enabled=false
