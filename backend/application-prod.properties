# ─── Production profile — Railway ──────────────────────────────────────────
# Railway tự động inject DATABASE_URL, REDIS_URL từ environment variables

# Tăng tốc startup — lazy init beans
spring.main.lazy-initialization=true

# Giảm connection pool để start nhanh hơn
spring.datasource.hikari.initialization-fail-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# Database — Railway PostgreSQL
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT — set via Railway env vars
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# CORS — allow frontend Railway domain
cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}

# Logging
logging.level.root=WARN
logging.level.backend=INFO

# Disable unused features in prod
spring.jmx.enabled=false
