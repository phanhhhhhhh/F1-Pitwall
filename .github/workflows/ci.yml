name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: Java 21 + Maven ────────────────────────────────────────────
  backend:
    name: Backend (Java 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build & unit tests
        run: ./mvnw --batch-mode test -Dspring.profiles.active=test
        env:
          JWT_SECRET: ci-test-secret-key-with-at-least-32-chars

      - name: Lint (Checkstyle / spotless if configured)
        run: ./mvnw --batch-mode compile -DskipTests
        continue-on-error: true

  # ── Frontend: Next.js ───────────────────────────────────────────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: f1-pitwall-client

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: f1-pitwall-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npx next build
